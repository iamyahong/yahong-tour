name: eoban-worker
run-name: "eoban-job-${{ inputs.job_id }}"

on:
  workflow_dispatch:
    inputs:
      request:
        description: "수정 요청 문장"
        required: true
        type: string
      job_id:
        description: "Eoban 작업 번호"
        required: true
        type: string

concurrency:
  group: eoban-worker
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  work:
    runs-on: ubuntu-latest
    steps:
      - name: dev 브랜치 체크아웃 (푸시 열쇠 = 사람 PAT)
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.EOBAN_WORKER_PAT }}
          fetch-depth: 0

      - name: Claude 일꾼 실행 (파일 수정만)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 12"
          prompt: |
            너는 Eoban의 코드 수정 일꾼이다. 지금 이 저장소는 dev 브랜치가 체크아웃되어 있다.
            아래 요청을 최소 변경으로 구현하라.

            요청: ${{ inputs.request }}

            반드시 지킬 규칙:
            - 파일 읽기·수정만 하라. git, gh, curl 등 저장소 밖으로 나가는 명령을 실행하지 말 것.
              커밋·푸시·PR은 다음 단계가 담당한다.
            - .github/ 아래의 어떤 파일도 수정 금지. package.json의 의존성 목록과 lockfile 수정 금지,
              새 패키지 설치 금지.
            - 데이터베이스·외부 API 호출 금지. 파일 삭제는 요청이 명시할 때만.
            - 요청이 모호하면 가장 보수적인 최소 변경을 택하라.
            - 끝나면 변경한 파일 목록과 한 줄 요약을 출력하라.

      - name: dev에 커밋·푸시 (게이트가 깨어나도록 사람 열쇠 사용)
        env:
          REQ: ${{ inputs.request }}
          JOB: ${{ inputs.job_id }}
        run: |
          git config user.name "eoban-worker"
          git config user.email "eoban-worker@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "worker: $REQ (eoban-job-$JOB)"
            git push origin dev
          fi

      - name: PR dev→staging 열기 (이미 열려 있으면 통과)
        env:
          GH_TOKEN: ${{ secrets.EOBAN_WORKER_PAT }}
          REQ: ${{ inputs.request }}
          JOB: ${{ inputs.job_id }}
        run: |
          gh pr create --base staging --head dev \
            --title "worker: $REQ" \
            --body "Eoban 작업 번호 $JOB — 일꾼이 dev에 반영한 변경입니다. 리허설(staging) 반영 전 검토용." \
            || echo "열려 있는 PR에 커밋이 추가되었습니다"
